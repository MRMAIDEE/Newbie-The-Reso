<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT inventory Dasboard</title>
    <link rel="stylesheet" href="style.css">


</head>
<body>
    <div class="layout"></div>

    <aside class="sidebar">
        <h2 class="logo">IT inventory</h2>
        <ul class="menu">
            <li>inventory</li>
            <li>Reports</li>
            <li>Settings</li>
            <li clss="Logout">Logout</li>

        </ul>
    </aside>
    
    <main class="main"></main>

    <header class="Topbar">
        <input type="text" placeholder="Search...">
        <div class="user">
            <strong>Admin User</strong><br>
            <small>IT Department</small>
        </div>
    </header>

    <section class="overview">
        <h1>Desboard Overview</h1>

    </section>

    <section class="card">
        <div clss="card">
            <h3>Total item</h3>
            <p class="number">245</p>

        </div>

        <div class="card">
            <h3>Total Value</h3>
            <p class="number">$45,200</p>
        </div>

        <div class="card warning">
            <h3>low Stock</h3>
            <p class="number">8</p>
        </div>

        <div class="card">
            <h3>Cotegories</h3>
            <p class="number">12</p>
        </div>
    </section>

    <section class="activity">
        <h2>Recent Activity</h2>
        <p>No recent activity to show.</p>

    </section>
    
</body>
</html>
