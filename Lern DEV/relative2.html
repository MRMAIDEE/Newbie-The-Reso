<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="relative.css">
    <style>
        body{
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;

        }
        .Main-box{
            width: 500px;
            height: 350px;
            border: 2px solid #45d;
            position: relative;
            
        }
        .col-box-1,.col-box-2,.col-box-3,.col-box-4,.centers{
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;

        }
        .col-box-1{
            background-color: blue;
            position: absolute;
            top: 10px;
            left: 15px;
        }
        .col-box-2{
        background-color: blue;
        position: absolute;
        top: 10px;
        left: 385px;
        }
        .col-box-3{
            background-color: blue;
            position: absolute;
            top: 240px;
            left: 15px;
        }
        .col-box-4{
            background-color: blue;
            position: absolute;
            top:240px ;
            left: 385px;
        }
        .centers{
            background-color: blue;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
        }
    </style>
</head>
<body>
    <div class="Main-box">
        <div class="col-box-1">
            <img src="PHOTO/IMG_5238.JPG" alt="">
        </div>
        <div class="col-box-2">
            <img src="PHOTO/IMG_5808.JPG" alt="">
        </div>
        <div class="col-box-3">
            <img src="PHOTO/IMG_5286.JPG" alt="">
        </div>
        <div class="col-box-4">
            <img src="PHOTO/IMG_5775.JPG" alt="">
        </div>
        <div class="centers">
            <img src="PHOTO/IMG_5771.JPG" alt="">
        </div>
    </div>

</body>
</html>
