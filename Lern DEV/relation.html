<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .body{
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;

        }
        .Main-box{
            width: 500px;
            height: 350px;
            border: 2px solid #45d;
            position: absolute;
            top: 30px;
            left: 40px;
        }
        .col-box-1,.col-box-2,.col-box-3,.col-box-4,.centers{
            width: 100px;
            height: 100px;
            border-radius: 50%;

        }
        .col-box-1{
            background-color: blue;
            position: absolute;
            top: 40px;
            left: 50px;
        }
        .col-box-2{
            background-color: blue;
            position: absolute;
            top: 270px;
            left: 50px;
        }
        .col-box-3{
            background-color: blue;
            position: absolute;
            top: 40px;
            left: 430px;
        }
        .col-box-4{
            background-color: blue;
            position: absolute;
            left: 430px;
            top: 270px;
        }
        .centers{
            background-image: url(4.jpeg);
            position: absolute;
            top: 150px;
            left: 230px;
        }
    </style>
</head>
<body>
    <div class="Main-box">
        <div class="col-box-1"></div>
        <div class="col-box-2"></div>
        <div class="col-box-3"></div>
        <div class="col-box-4"></div>
        <div class="centers"></div>
    </div>
    
</body>
</html>
