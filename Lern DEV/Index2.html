<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IT Inventory Dashboard</title>
  <link rel="stylesheet" href="style2.css">
</head>
<body>

<div class="container">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2 class="logo">IT Inventory</h2>

    <nav>
      <a class="active">Dashboard</a>
      <a>Inventory</a>
      <a>Reports</a>
      <a>Settings</a>
    </nav>

    <div class="logout">Logout</div>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- Topbar -->
    <header class="topbar">
      <input type="text" placeholder="Search...">
      <div class="profile">
        <div class="avatar">AD</div>
        <div>
          <strong>Admin User</strong>
          <small>IT Department</small>
        </div>
      </div>
    </header>

    <!-- Overview -->
    <section class="overview">
      <h1>Dashboard Overview</h1>
      <p>Welcome back, Admin</p>
    </section>

    <!-- Cards -->
    <section class="cards">
      <div class="card">
        <h4>Total Items</h4>
        <span>245</span>
      </div>

      <div class="card">
        <h4>Total Value</h4>
        <span>$45,200</span>
      </div>

      <div class="card alert">
        <h4>Low Stock</h4>
        <span>8</span>
      </div>

      <div class="card">
        <h4>Categories</h4>
        <span>12</span>
      </div>
    </section>

    <!-- Activity -->
    <section class="activity">
      <h3>Recent Activity</h3>
      <p>No recent activity to show.</p>
    </section>

  </main>
</div>

</body>
</html>
